name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-test:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Chronith.slnx

      - name: Build
        run: dotnet build Chronith.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test tests/Chronith.Tests.Unit --no-build -c Release \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./test-results
          dotnet test tests/Chronith.Tests.Integration --no-build -c Release \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results
          dotnet test tests/Chronith.Tests.Functional --no-build -c Release \
            --logger "trx;LogFileName=functional.trx" \
            --results-directory ./test-results

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Unit · Integration · Functional'
          path: './test-results/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload TRX artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: chronith-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
