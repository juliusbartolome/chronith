name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "dashboard/**"
      - "packages/sdk-typescript/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/sdk-ci.yml"
      - ".github/workflows/auto-approve.yml"
      - "packages/sdk-csharp/**"
      - ".github/workflows/sdk-csharp-ci.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "dashboard/**"
      - "packages/sdk-typescript/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/sdk-ci.yml"
      - ".github/workflows/auto-approve.yml"
      - "packages/sdk-csharp/**"
      - ".github/workflows/sdk-csharp-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
      e2e: ${{ steps.filter.outputs.e2e }}
      load: ${{ steps.filter.outputs.load }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      csharp: ${{ steps.filter.outputs.csharp }}
      javascript: ${{ steps.filter.outputs.javascript }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/Chronith.Tests.Unit/**'
              - 'tests/Chronith.Tests.Integration/**'
              - 'tests/Chronith.Tests.Functional/**'
              - 'Chronith.slnx'
              - 'global.json'
              - 'src/Directory.Build.props'
              - '.github/workflows/ci.yml'
            docker:
              - 'src/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.dockerignore'
              - 'docker/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'src/**'
              - 'dashboard/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            load:
              - 'src/**'
              - 'tests/Chronith.Tests.Load/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            benchmarks:
              - 'src/**'
              - 'tests/Chronith.Tests.Performance/**'
              - 'Chronith.slnx'
              - 'global.json'
              - '.github/workflows/ci.yml'
            csharp:
              - 'src/**'
              - 'tests/**'
              - 'Chronith.slnx'
              - 'global.json'
              - '.github/workflows/ci.yml'
            javascript:
              - 'dashboard/**'
              - 'packages/**'
              - 'docs/site/**'
              - '.github/workflows/ci.yml'

  dotnet-test:
    name: .NET Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chronith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Chronith.slnx

      - name: Build
        run: dotnet build Chronith.slnx --no-restore -c Release

      - name: Test
        env:
          CI_INTEGRATION_CONNECTION_STRING: "Host=localhost;Port=5432;Database=chronith_test;Username=test;Password=test"
          CI_FUNCTIONAL_CONNECTION_STRING: "Host=localhost;Port=5432;Database=chronith_test;Username=test;Password=test"
          CI_REDIS_CONNECTION_STRING: "localhost:6379"
        run: |
          dotnet test tests/Chronith.Tests.Unit --no-build -c Release \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./test-results
          dotnet test tests/Chronith.Tests.Integration --no-build -c Release \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results
          dotnet test tests/Chronith.Tests.Functional --no-build -c Release \
            --logger "trx;LogFileName=functional.trx" \
            --results-directory ./test-results

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: 'Unit · Integration · Functional'
          path: './test-results/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload TRX artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: chronith-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 15
    env:
      JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
      SECURITY_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load into Docker daemon)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: chronith-chronith-api:latest
          cache-from: type=gha

      - name: Start stack (no grafana — port 3000 reserved for dashboard)
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --scale grafana=0 --scale prometheus=0

      - name: Wait for API health
        run: |
          echo "Waiting for /health/live..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5001/health/live > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for health endpoint"
          docker compose logs
          exit 1

      - name: Seed database
        run: |
          docker exec -i chronith-postgres-1 psql -U chronith -d chronith <<'SQL'
            SET search_path = chronith;

            -- Tenant
            INSERT INTO tenants ("Id", "Name", "Slug", "TimeZoneId", "IsDeleted", "CreatedAt")
            VALUES ('00000000-0000-0000-0000-000000000001','Test Tenant','test-tenant','UTC',false,NOW())
            ON CONFLICT ("Id") DO NOTHING;

            -- Admin user (password: Password1!)
            INSERT INTO "TenantUsers" ("Id", "TenantId", "Email", "PasswordHash", "Role", "IsActive", "IsEmailVerified", "CreatedAt")
            VALUES (
              '00000000-0000-0000-0000-000000000099',
              '00000000-0000-0000-0000-000000000001',
              'admin@test.com',
              '$2b$12$Qj5PqpaFuFx64GY2FVgjSuoz/MGmZdR6qwLqhFSkIX4092S/m0Eh2',
              'Owner',
              true,
              true,
              NOW()
            )
            ON CONFLICT ("Id") DO NOTHING;

            -- Booking types
            INSERT INTO booking_types ("Id", "TenantId", "Name", "Slug", "DurationMinutes", "Capacity", "Kind", "PaymentMode", "PriceInCentavos", "IsDeleted")
            VALUES
              ('00000000-0000-0000-0000-000000000010','00000000-0000-0000-0000-000000000001','Consultation','consultation',60,10,'TimeSlot','Manual',50000,false),
              ('00000000-0000-0000-0000-000000000011','00000000-0000-0000-0000-000000000001','Quick Check','quick-check',30,5,'TimeSlot','Manual',0,false)
            ON CONFLICT ("Id") DO NOTHING;

            -- Availability windows (Mon-Sun, 08:00-18:00 for both booking types)
            INSERT INTO availability_windows ("Id", "BookingTypeId", "DayOfWeek", "StartTime", "EndTime")
            SELECT gen_random_uuid(), bt."Id", d.day, '08:00'::time, '18:00'::time
            FROM booking_types bt
            CROSS JOIN (SELECT generate_series(0,6) AS day) d
            WHERE bt."Id" IN (
              '00000000-0000-0000-0000-000000000010',
              '00000000-0000-0000-0000-000000000011'
            )
            ON CONFLICT DO NOTHING;

            -- Tenant plans (needed for signup step 2)
            INSERT INTO tenant_plans ("Id", "Name", "MaxBookingTypes", "MaxStaffMembers", "MaxBookingsPerMonth", "MaxCustomers", "NotificationsEnabled", "AnalyticsEnabled", "CustomBrandingEnabled", "ApiAccessEnabled", "AuditLogEnabled", "PriceCentavos", "IsActive", "SortOrder", "CreatedAt", "IsDeleted")
            VALUES
              ('00000000-0000-0000-0000-000000000020', 'Free', 2, 1, 50, 100, false, false, false, false, false, 0, true, 0, NOW(), false),
              ('00000000-0000-0000-0000-000000000021', 'Pro', 10, 5, 500, 1000, true, true, false, true, false, 99900, true, 1, NOW(), false),
              ('00000000-0000-0000-0000-000000000022', 'Business', 50, 25, 5000, 10000, true, true, true, true, true, 299900, true, 2, NOW(), false)
            ON CONFLICT ("Id") DO NOTHING;
          SQL

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard
        env:
          # Dashboard defaults to http://localhost:5001 when unset; set explicitly for clarity
          CHRONITH_API_URL: http://localhost:5001

      - name: Prepare standalone server
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
        working-directory: dashboard

      - name: Start dashboard server
        run: node .next/standalone/server.js &
        working-directory: dashboard
        env:
          PORT: 3000
          CHRONITH_API_URL: http://localhost:5001

      - name: Wait for dashboard on port 3000
        run: |
          echo "Waiting for dashboard on port 3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Dashboard ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for dashboard"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --project="Desktop Chrome" --project="Mobile Chrome"
        working-directory: dashboard
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down

  k6-load-tests:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
      SECURITY_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load into Docker daemon)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: chronith-chronith-api:latest
          cache-from: type=gha

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d

      - name: Wait for health
        run: |
          echo "Waiting for /health/live..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5001/health/live > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for health endpoint"
          docker compose logs
          exit 1

      - name: Seed database
        run: |
          docker exec -i chronith-postgres-1 psql -U chronith -d chronith <<'SQL'
            SET search_path = chronith;

            INSERT INTO tenants ("Id", "Name", "Slug", "TimeZoneId", "IsDeleted", "CreatedAt")
            VALUES ('00000000-0000-0000-0000-000000000001','Test Tenant','test-tenant','UTC',false,NOW())
            ON CONFLICT ("Id") DO NOTHING;

            INSERT INTO booking_types ("Id", "TenantId", "Name", "Slug", "DurationMinutes", "Capacity", "Kind", "PaymentMode", "PriceInCentavos", "IsDeleted")
            VALUES
              ('00000000-0000-0000-0000-000000000010','00000000-0000-0000-0000-000000000001','Test Type','test-type',60,100,'TimeSlot','Manual',10000,false),
              ('00000000-0000-0000-0000-000000000011','00000000-0000-0000-0000-000000000001','Capacity One Type','capacity-one-type',60,1,'TimeSlot','Manual',0,false)
            ON CONFLICT ("Id") DO NOTHING;

            INSERT INTO availability_windows ("Id", "BookingTypeId", "DayOfWeek", "StartTime", "EndTime")
            SELECT gen_random_uuid(), bt."Id", d.day, '08:00'::time, '18:00'::time
            FROM booking_types bt
            CROSS JOIN (SELECT generate_series(0,6) AS day) d
            WHERE bt."Id" IN (
              '00000000-0000-0000-0000-000000000010',
              '00000000-0000-0000-0000-000000000011'
            )
            ON CONFLICT DO NOTHING;
          SQL

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run availability.js
        env:
          BASE_URL: http://localhost:5001
          JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
        run: |
          k6 run tests/Chronith.Tests.Load/scripts/availability.js \
            --env BASE_URL="$BASE_URL" \
            --env JWT_SIGNING_KEY="$JWT_SIGNING_KEY" \
            2>&1 | tee k6-availability.txt

      - name: Run create-booking.js
        env:
          BASE_URL: http://localhost:5001
          JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
        run: |
          k6 run tests/Chronith.Tests.Load/scripts/create-booking.js \
            --env BASE_URL="$BASE_URL" \
            --env JWT_SIGNING_KEY="$JWT_SIGNING_KEY" \
            2>&1 | tee k6-create-booking.txt

      - name: Clear bookings before lifecycle
        run: |
          docker exec -i chronith-postgres-1 psql -U chronith -d chronith <<'SQL'
            SET search_path = chronith;
            DELETE FROM bookings
            WHERE "Start" >= '2026-06-01T00:00:00+00:00'
              AND "Start" <  '2026-07-01T00:00:00+00:00';
          SQL

      - name: Run booking-lifecycle.js
        env:
          BASE_URL: http://localhost:5001
          JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
        run: |
          k6 run tests/Chronith.Tests.Load/scripts/booking-lifecycle.js \
            --env BASE_URL="$BASE_URL" \
            --env JWT_SIGNING_KEY="$JWT_SIGNING_KEY" \
            2>&1 | tee k6-booking-lifecycle.txt

      - name: Clear slot before concurrent test
        run: |
          docker exec -i chronith-postgres-1 psql -U chronith -d chronith <<'SQL'
            SET search_path = chronith;
            DELETE FROM bookings
            WHERE "Start" = '2026-05-04T10:00:00+00:00';
          SQL

      - name: Run concurrent-booking.js
        env:
          BASE_URL: http://localhost:5001
          JWT_SIGNING_KEY: change-me-in-production-at-least-32-chars
        run: |
          k6 run tests/Chronith.Tests.Load/scripts/concurrent-booking.js \
            --env BASE_URL="$BASE_URL" \
            --env JWT_SIGNING_KEY="$JWT_SIGNING_KEY" \
            2>&1 | tee k6-concurrent-booking.txt

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## k6 Load Test Results"
            echo ""
            echo "| Script | Result |"
            echo "|--------|--------|"
            for script in availability create-booking booking-lifecycle concurrent-booking; do
              file="k6-${script}.txt"
              if [ -f "$file" ]; then
                if grep -q "default ✓" "$file"; then
                  result="✅ PASS"
                else
                  result="❌ FAIL"
                fi
              else
                result="⚠️ NOT RUN"
              fi
              echo "| ${script} | ${result} |"
            done
            echo ""
            for script in availability create-booking booking-lifecycle concurrent-booking; do
              file="k6-${script}.txt"
              if [ -f "$file" ]; then
                echo "<details><summary>${script} full output</summary>"
                echo ""
                echo '```'
                cat "$file"
                echo '```'
                echo "</details>"
                echo ""
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-results
          path: k6-*.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Chronith.slnx

      - name: Run benchmarks
        run: |
          dotnet run -c Release --project tests/Chronith.Tests.Performance \
            -- --filter "*" --exporters json markdown

      - name: Write benchmark summary
        if: always()
        run: |
          {
            echo "## BenchmarkDotNet Results"
            echo ""
            for f in BenchmarkDotNet.Artifacts/results/*.md; do
              if [ -f "$f" ]; then
                cat "$f"
                echo ""
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload BenchmarkDotNet artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
          retention-days: 30

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Setup .NET (C# only)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
