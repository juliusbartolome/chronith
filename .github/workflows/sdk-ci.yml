name: SDK CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "packages/sdk-typescript/**"
      - "src/**"
      - ".github/workflows/sdk-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/sdk-typescript/**"
      - "src/**"
      - ".github/workflows/sdk-ci.yml"

defaults:
  run:
    working-directory: packages/sdk-typescript

jobs:
  lint-typecheck:
    name: SDK Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/sdk-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/sdk-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
