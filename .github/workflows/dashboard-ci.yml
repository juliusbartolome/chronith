name: Dashboard CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"

defaults:
  run:
    working-directory: dashboard

permissions: {}

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CHRONITH_API_URL: http://localhost:5001

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dashboard image
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: false
          tags: chronith-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dashboard:
    name: Deploy Dashboard
    needs: [lint-typecheck, unit-tests, build, docker-build]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && !failure()
      && !cancelled()
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push dashboard image
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/juliusbartolome/chronith-dashboard:latest
            ghcr.io/juliusbartolome/chronith-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Azure CD webhook
        env:
          WEBHOOK_URL: ${{ secrets.CHRONITH_DASHBOARD_CD_WEBHOOK_URL }}
        run: curl -fsS -X POST "$WEBHOOK_URL"

      - name: Wait for production health
        run: |
          echo "Polling https://chronith-dashboard.azurewebsites.net ..."
          for i in $(seq 1 24); do
            status=$(curl -o /dev/null -s -w "%{http_code}" https://chronith-dashboard.azurewebsites.net || true)
            if [ "$status" = "200" ]; then
              echo "Dashboard healthy after ~$((i * 5))s"
              exit 0
            fi
            echo "  attempt $i: HTTP $status — retrying in 5s..."
            sleep 5
          done
          echo "Dashboard health check timed out after ~120s"
          exit 1
