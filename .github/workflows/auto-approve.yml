name: Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
        if: github.actor == 'juliusbartolome'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
