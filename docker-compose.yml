services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chronith
      POSTGRES_USER: chronith
      POSTGRES_PASSWORD: chronith
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronith"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

  chronith-api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      Database__Provider: PostgreSQL
      Database__ConnectionString: "Host=postgres;Port=5432;Database=chronith;Username=chronith;Password=chronith"
      Jwt__SigningKey: "change-me-in-production-at-least-32-chars"
      ASPNETCORE_URLS: "http://+:8080"
      Payments__Provider: "Stub"
      Payments__Currency: "PHP"
      Webhooks__DispatchIntervalSeconds: "10"
      Webhooks__HttpTimeoutSeconds: "10"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379"
      Observability__OtlpEndpoint: "http://jaeger:4317"
      Observability__ServiceName: "chronith-api"
      Observability__EnableTracing: "true"
      Observability__EnableMetrics: "true"

volumes:
  postgres_data:
