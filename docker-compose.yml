services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chronith
      POSTGRES_USER: chronith
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronith}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronith"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3002:3000"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chronith:${POSTGRES_PASSWORD:-chronith}@postgres:5432/chronith
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U chronith"]
      interval: 10s
      timeout: 5s
      retries: 5

  chronith-api:
    build: .
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      azurite:
        condition: service_started
    environment:
      Database__Provider: PostgreSQL
      Database__ConnectionString: "Host=pgbouncer;Port=5432;Database=chronith;Username=chronith;Password=${POSTGRES_PASSWORD:-chronith};Pooling=false"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in .env}"
      Security__EncryptionKeyVersion: "v1"
      Security__KeyVersions__v1: "${SECURITY_ENCRYPTION_KEY:?SECURITY_ENCRYPTION_KEY must be set in .env}"
      ASPNETCORE_URLS: "http://+:8080"
      Payments__Provider: "Stub"
      Payments__Currency: "PHP"
      Webhooks__DispatchIntervalSeconds: "10"
      Webhooks__HttpTimeoutSeconds: "10"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379"
      Observability__OtlpEndpoint: "http://jaeger:4317"
      Observability__ServiceName: "chronith-api"
      Observability__EnableTracing: "true"
      Observability__EnableMetrics: "true"
      RateLimiting__Auth__PermitLimit: "99999"
      RateLimiting__Auth__WindowSeconds: "300"
      BlobStorage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - CHRONITH_API_URL=http://chronith-api:8080
      - NODE_ENV=production
    depends_on:
      - chronith-api
    profiles:
      - dashboard

volumes:
  postgres_data:
  azurite_data:
